<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaans Aura Super OS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #22c55e;
    }
    .screen { display: none; width: 100%; }
    .screen.active { display: flex; justify-content: center; padding: 2rem 1rem; }
    .card {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      width: 360px;
    }
    .titlebar {
      background: #1a1a1a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 7px;
      border-bottom: 1px solid #2a2a2a;
    }
    .titlebar-title { margin-left: 8px; font-size: 12px; color: #555; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .card-body { padding: 24px; }
    .brand { font-size: 20px; font-weight: bold; color: #22c55e; margin-bottom: 4px; }
    .brand-sub { font-size: 12px; color: #444; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
    .field { margin-bottom: 14px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #22c55e; }
    input::placeholder { color: #444; }
    .btn {
      width: 100%;
      background: #22c55e;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #16a34a; }
    .msg { font-size: 12px; min-height: 18px; margin-bottom: 10px; }
    .msg.err { color: #f87171; }
    .msg.ok  { color: #22c55e; }
    .switch-link { text-align: center; margin-top: 14px; font-size: 12px; color: #444; }
    .switch-link span { color: #22c55e; cursor: pointer; text-decoration: underline; }
    #screen-os .card { width: min(680px, 100%); }
    .os-titlebar {
      background: #1a1a1a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a;
    }
    .os-titlebar-left { display: flex; align-items: center; gap: 7px; }
    #os-username-badge { font-size: 12px; color: #22c55e; }
    .btn-ghost {
      background: transparent;
      color: #22c55e;
      border: 1px solid #22c55e;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
    }
    .btn-ghost:hover { background: #0f2d1a; }
    #os-output {
      padding: 16px;
      min-height: 320px;
      max-height: 420px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.8;
      color: #22c55e;
    }
    .os-inputbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-top: 1px solid #1a1a1a;
      background: #0d0d0d;
    }
    .os-prompt { color: #22c55e; margin-right: 8px; font-size: 13px; }
    #os-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #22c55e;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      caret-color: #22c55e;
    }
    #os-input::placeholder { color: #333; }
  </style>
</head>
<body>

        <div class="dot" style="background:#28c840"></div>
